{{/* Custom Publications Timeline Block */}}
{{ $page := .wcPage }}
{{ $block := .wcBlock }}

<div class="flex flex-col items-center mx-auto w-full max-w-prose justify-center hb-main-content">
  {{ with $block.content.title }}
  <h2 class="mb-6 w-full text-left text-xl font-semibold text-gray-900 dark:text-white mb-4 pb-2 border-b border-gray-200 dark:border-gray-700">{{ . }}</h2>
  {{ end }}

  <ol class="relative w-full border-s border-gray-200 dark:border-gray-700">
    {{ range $block.content.items }}
    <li class="mb-8 ms-6">
      <span class="absolute flex items-center justify-center w-6 h-6 bg-primary-100 rounded-full -start-3 ring-8 ring-white dark:ring-gray-900 dark:bg-primary-900">
        <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 256 256" class="w-5 h-5 text-primary-800 dark:text-primary-300">
          <path d="M213.66,82.34l-56-56A8,8,0,0,0,152,24H56A16,16,0,0,0,40,40V216a16,16,0,0,0,16,16H200a16,16,0,0,0,16-16V88A8,8,0,0,0,213.66,82.34ZM160,51.31,188.69,80H160ZM200,216H56V40h88V88a8,8,0,0,0,8,8h48V216Z"/>
        </svg>
      </span>
      <p class="mb-1 text-base font-semibold text-gray-900 dark:text-white">{{ .title }}</p>
      <p class="text-sm font-normal leading-snug text-gray-500 dark:text-gray-300">{{ .authors }}</p>
      <p class="text-sm font-normal leading-snug text-gray-500 dark:text-gray-300"><em>{{ .venue }}</em></p>
    </li>
    {{ end }}
  </ol>
</div>
